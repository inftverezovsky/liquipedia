name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: liquipedia_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d liquipedia_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ADMIN_PASSWORD: "63016"
      ADMIN_SESSION_SECRET: "ci-session-secret"
      ADMIN_MTLS_ENABLED: "false"
      DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5432/liquipedia_ci"
      PLAYWRIGHT_PORT: "3010"
      RUN_DB_E2E: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Apply database migrations
        run: npm run db:migrate:deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Dependency audit
        run: npm audit --audit-level=moderate

      - name: Production build
        run: npm run build

      - name: E2E smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
