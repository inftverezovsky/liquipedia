name: tcyber

services:
  postgres:
    image: postgres:16
    container_name: tcyber-postgres
    restart: always
    environment:
      POSTGRES_USER: tcyber
      POSTGRES_PASSWORD: tcyber
      POSTGRES_DB: tcyber
    ports:
      - "5434:5432"
    volumes:
      - tcyber_postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: tcyber-web
    restart: always
    ports:
      - "3010:3010"
    environment:
      DATABASE_URL: postgresql://tcyber:tcyber@postgres:5432/tcyber?schema=public
      LIQUIPEDIA_USER_AGENT: "tcyber-local-docker/0.1 (local development; contact@example.com)"
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-63016}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-tcyber-admin-session-secret}
      ADMIN_COOKIE_SECURE: ${ADMIN_COOKIE_SECURE:-false}
      TCYBER_INSTANCE_ID: ${TCYBER_INSTANCE_ID:-docker-local}
      TCYBER_SYNC_PEER_URL: ${TCYBER_SYNC_PEER_URL:-}
      TCYBER_SYNC_TOKEN: ${TCYBER_SYNC_TOKEN:-}
      TCYBER_SYNC_TIMEOUT_MS: ${TCYBER_SYNC_TIMEOUT_MS:-60000}
      LIQUIPEDIA_SEARCH_VARIATION_LIMIT: ${LIQUIPEDIA_SEARCH_VARIATION_LIMIT:-5}
      LIQUIPEDIA_SEARCH_FULLTEXT_VARIATION_LIMIT: ${LIQUIPEDIA_SEARCH_FULLTEXT_VARIATION_LIMIT:-2}
      LIQUIPEDIA_SEARCH_TIME_BUDGET_MS: ${LIQUIPEDIA_SEARCH_TIME_BUDGET_MS:-45000}
      LIQUIPEDIA_SEARCH_API_TIMEOUT_MS: ${LIQUIPEDIA_SEARCH_API_TIMEOUT_MS:-7000}
      LIQUIPEDIA_SEARCH_API_MAX_RETRIES: ${LIQUIPEDIA_SEARCH_API_MAX_RETRIES:-0}
      LIQUIPEDIA_IMPORT_API_TIMEOUT_MS: ${LIQUIPEDIA_IMPORT_API_TIMEOUT_MS:-12000}
      LIQUIPEDIA_IMPORT_API_MAX_RETRIES: ${LIQUIPEDIA_IMPORT_API_MAX_RETRIES:-0}
      LIQUIPEDIA_DIRECT_FALLBACK_ENABLED: ${LIQUIPEDIA_DIRECT_FALLBACK_ENABLED:-1}
      HLTV_SEARCH_TIMEOUT_MS: ${HLTV_SEARCH_TIMEOUT_MS:-30000}
      HLTV_SEARCH_RESULT_WAIT_MS: ${HLTV_SEARCH_RESULT_WAIT_MS:-12000}
      HLTV_SEARCH_MAX_ATTEMPTS: ${HLTV_SEARCH_MAX_ATTEMPTS:-1}
      HLTV_ALLOW_DIRECT_FALLBACK: ${HLTV_ALLOW_DIRECT_FALLBACK:-1}
      PORT: 3010
    volumes:
      - ./certs:/app/certs:ro
      - tcyber_cache:/app/cache
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3010) + '/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  tcyber_postgres_data:
  tcyber_cache:
