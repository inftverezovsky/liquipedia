name: tcyber

services:
  postgres:
    image: postgres:16
    container_name: tcyber-postgres
    restart: always
    environment:
      POSTGRES_USER: tcyber
      POSTGRES_PASSWORD: tcyber
      POSTGRES_DB: tcyber
    ports:
      - "5434:5432"
    volumes:
      - tcyber_postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: tcyber-web
    restart: always
    ports:
      - "3010:3010"
    environment:
      DATABASE_URL: postgresql://tcyber:tcyber@postgres:5432/tcyber?schema=public
      LIQUIPEDIA_USER_AGENT: "tcyber-local-docker/0.1 (local development; contact@example.com)"
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-63016}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-tcyber-admin-session-secret}
      ADMIN_COOKIE_SECURE: ${ADMIN_COOKIE_SECURE:-false}
      PORT: 3010
    volumes:
      - ./certs:/app/certs:ro
      - tcyber_cache:/app/cache
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3010) + '/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  tcyber_postgres_data:
  tcyber_cache:
