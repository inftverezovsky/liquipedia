services:
  postgres:
    image: postgres:16-alpine
    container_name: liquipedia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: liquipedia
      POSTGRES_PASSWORD: liquipedia
      POSTGRES_DB: liquipedia
    ports:
      - "5434:5432"
    volumes:
      - liquipedia-postgres-data:/var/lib/postgresql/data

volumes:
  liquipedia-postgres-data:
